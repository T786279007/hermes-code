name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check .
      - name: Run ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install pytest anyio
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short -q

  screenshot-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event.pull_request.commits }}
      - name: Check for UI changes without screenshots
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          # Files that count as UI changes
          UI_PATTERNS=(
            "web_api.py"
            "dashboard.py"
            "*.html"
            "*.css"
            "*.vue"
            "*.jsx"
            "*.tsx"
          )

          CHANGED=$(git diff --name-only "$BASE" HEAD)

          UI_CHANGED=false
          for f in $CHANGED; do
            for p in "${UI_PATTERNS[@]}"; do
              if [[ "$f" == $p ]]; then
                UI_CHANGED=true
                break 2
              fi
            done
          done

          if $UI_CHANGED; then
            # Check if screenshots were added/modified
            SCREENSHOT=$(echo "$CHANGED" | grep -iE '\.(png|jpg|jpeg|gif|webp|svg)$' || true)
            if [ -z "$SCREENSHOT" ]; then
              echo "::error::UI files were modified but no screenshots were added."
              echo "Changed UI files: $(echo "$CHANGED" | grep -E '(${UI_PATTERNS[*]// /|})' || true)"
              echo "Please attach screenshots of the UI changes."
              exit 1
            else
              echo "✅ UI changes detected with screenshots attached."
            fi
          else
            echo "✅ No UI changes detected, screenshot check skipped."
          fi

  stale-副本-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for stale src/副本
        run: |
          if [ -d "src/hermes" ]; then
            echo "::warning::src/hermes/ directory still exists. This is a stale copy that should be removed."
            echo "Files in src/hermes/: $(ls src/hermes/ | wc -l)"
            # Warn but don't fail CI (for now)
          fi
          echo "✅ Stale copy check complete."
